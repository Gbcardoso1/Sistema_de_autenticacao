<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de login</title>
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>
    <div class="login-container">
        <div class="model-email">
            <label>Email</label> <br>
            <input type="text" id="login-email" placeholder="Digite seu Email">
        </div>
        <div class="model-password">
            <label>Senha</label> <br>
            <input type="password" id="login-password" placeholder="Digite sua senha"> <br>
            <a href="#">Esqueceu a senha?</a> <br>
            <input type="checkbox">
            <label>Corcordo com os termos!</label>
            <div class="model-btn"> 
                <button id="btnEntrar">Entrar</button>
                <button id="btnCadastrar">Cadastrar</button>
            </div>
        </div>
    </div>
    <div class="Cadastrar-container">   
        <div class="model-nome-cadastro">
            <label>Nome</label> <br>
            <input type="text" id="Cadastrar-nome" placeholder="Digite seu nome">
        </div>
        <div class="model-senha-cadastro">
            <label>Senha</label> <br>
            <input type="password" id="Cadastrar-senha" placeholder="Digite nova senha">
        </div>
        <div class="model-senha-cadastro">
            <label>Digite a senha novamente</label> <br>
            <input type="text" id="Cadastrar-nome" placeholder="Digite sua senha">
        </div>
        <div class="model-nome-cadastro">
            <label>Email</label> <br>
            <input type="text" id="Cadastrar-nome" placeholder="Digite seu nome">
            <div>
                <button id="btnCadastrar">Cadastrar</button>
            </div>
        </div>
    </div>
</body>

</html>
