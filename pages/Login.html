<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="../style/LoginStyle.css">
</head>

<body>
    <form class="login-container">
        <div class="model-email">
            <label>Email</label> <br>
            <input type="text" id="login-email" placeholder="Digite seu Email">
        </div>
        <div class="model-password">
            <label>Senha</label> <br>
            <input type="password" id="login-password" placeholder="Digite sua senha">
        </div>
        <div class="model-btn">
            <button id="btnEntrar">Entrar</button>
        </div>
        <div class="model-esqueceuSenha">
            <a href="./RecuperarSenha.html">Esqueceu a senha?</a> <br>
            <a href="./Cadastro.html">Cadastre-se</a>
        </div>
    </form>
</body>

</html>
