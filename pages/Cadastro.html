<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de cadastro</title>
    <link rel="stylesheet" href="../style/CadastroStyle.css">
</head>
<body>
    <form class="Cadastrar-container">
        <div class="model-nome-cadastro">
            <label>Nome</label> <br>
            <input type="text" id="Cadastrar-nome" placeholder="Digite seu nome">
        </div>
        <div class="model-senha-cadastro">
            <label>Senha</label> <br>
            <input type="password" id="Cadastrar-senha" placeholder="Digite nova senha">
        </div>
        <div class="model-senha-cadastro">
            <label>Digite a senha novamente</label> <br>
            <input type="password" id="Cadastrar-senha" placeholder="Digite sua senha novamente">
        </div>
        <div class="model-email-cadastro">
            <label>Email</label> <br>
            <input type="email" id="Cadastrar-email" placeholder="Digite seu email">
            <div>
                <button id="btnCadastrar">Cadastrar</button>
            </div>
        </div>
    </form>
</body>
</html>
